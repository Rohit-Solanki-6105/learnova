<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | Curator Study</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#920028",
              "surface-container-highest": "#e2e2e2",
              "on-tertiary-fixed-variant": "#474647",
              "secondary-container": "#e2e2e2",

              "on-secondary-fixed": "#1a1c1c",
              "tertiary": "#5d5c5c",
              "error": "#ba1a1a",
              "on-secondary": "#ffffff",
              "on-surface-variant": "#5d3f40",
              "surface-tint": "#be0037",
              "inverse-primary": "#ffb3b6",
              "surface-container": "#eeeeee",
              "error-container": "#ffdad6",
              "secondary": "#5d5f5e",

              "primary": "#ba0035",
              "primary-container": "#e70545",
              "background": "#f9f9f9",
              "surface-container-low": "#f3f3f3",
              "on-tertiary-fixed": "#1c1b1c",
              "surface-dim": "#dadada",
              "outline": "#926e6f",
              "surface-variant": "#e2e2e2",
              "tertiary-fixed-dim": "#c8c6c6",
              "surface-container-lowest": "#ffffff",
              "on-background": "#1a1c1c",
              "on-error-container": "#93000a",
              "surface": "#f9f9f9",
              "on-secondary-container": "#636564",
              "outline-variant": "#e7bcbd"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="antialiased text-on-surface">
<!-- Split Screen Container -->
<main class="min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Side: Register Container -->
<section class="w-full md:w-1/2 lg:w-[45%] flex items-center justify-center bg-surface-container-lowest p-8 md:p-12 lg:p-20 relative z-10">
<div class="max-w-md w-full">
<!-- Brand Anchor -->
<div class="mb-12">
<span class="text-2xl font-bold tracking-tight text-neutral-900 font-headline">Curator Study</span>
</div>
<!-- Header Section -->
<header class="mb-10">
<h1 class="text-4xl md:text-5xl font-bold font-headline text-on-surface tracking-tight mb-4">
                        Create your account
                    </h1>
<p class="text-secondary text-lg font-body leading-relaxed">
                        Join our elite academic community today
                    </p>
</header>
<!-- Registration Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-4">
<!-- Full Name -->
<div class="relative">
<label class="block text-[0.7rem] font-bold uppercase tracking-widest text-primary mb-2 ml-4">Full Name</label>
<input class="w-full px-6 py-4 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-secondary/50 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" placeholder="Alexandria Sterling" type="text"/>
</div>
<!-- Email -->
<div class="relative">
<label class="block text-[0.7rem] font-bold uppercase tracking-widest text-primary mb-2 ml-4">Email Address</label>
<input class="w-full px-6 py-4 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-secondary/50 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" placeholder="sterling@curator.edu" type="email"/>
</div>
<!-- Password -->
<div class="relative">
<label class="block text-[0.7rem] font-bold uppercase tracking-widest text-primary mb-2 ml-4">Security Key</label>
<div class="relative">
<input class="w-full px-6 py-4 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-secondary/50 focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary/60" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Role Selection -->
<div class="relative">
<label class="block text-[0.7rem] font-bold uppercase tracking-widest text-primary mb-2 ml-4">Academic Role</label>
<select class="w-full px-6 py-4 bg-surface-container-low border-0 rounded-lg text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300 appearance-none">
<option value="learner">Learner</option>
<option value="instructor">Instructor</option>
<option value="curator">Curator</option>
</select>
<div class="absolute right-4 top-[60%] -translate-y-1/2 pointer-events-none text-secondary/60">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full py-5 bg-primary text-on-primary font-bold rounded-full text-lg shadow-xl shadow-primary/10 hover:bg-primary-container transition-all duration-300 transform active:scale-[0.98]">
                            Sign Up
                        </button>
</div>
</form>
<!-- Footer Text -->
<footer class="mt-12 text-center">
<p class="text-secondary font-body">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1 transition-all" href="#">Log in</a>
</p>
</footer>
</div>
</section>
<!-- Right Side: Visual Canvas -->
<section class="hidden md:block md:w-1/2 lg:w-[55%] relative overflow-hidden bg-surface-container-high">
<!-- Hero Image with subtle editorial overlay -->
<div class="absolute inset-0 bg-cover bg-center transition-transform duration-[2000ms] hover:scale-105" data-alt="Modern minimalist library architecture with sharp shadows and light" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDFHqyMaIwOFV3yT-KyUIhubP0pODbgrANhinb62APkca_29KR5u_Os5kngV2GdlqzHyy9E_y_6ljWffcPsRChTAM73Cb4AKS6zT5mVrFQxrw6ViliP_oeXRoSb00-ThvKfavnlg7n45l1FR2wsj_083MGaZDU4LiMD2x2Gpq4vGK59XI7RLM39U_F7Lua-xPTE0IjRp66CXmM02FekfQb6_uvCmIaBK4Jmq8dW8xu88yN8wmxTu5HcPGoRa5qYBMSzesQ23bXCPZpS')">
</div>
<!-- Gradient Layer for Contrast -->
<div class="absolute inset-0 bg-gradient-to-tr from-neutral-900/60 via-transparent to-transparent"></div>
<!-- Content Overlay -->
<div class="absolute bottom-0 left-0 p-12 lg:p-20 max-w-2xl">
<div class="bg-white/10 backdrop-blur-md p-1 w-20 mb-8 rounded-full"></div>
<h2 class="text-5xl lg:text-7xl font-headline font-extrabold text-white leading-[1.1] tracking-tight mb-6">
                    The future of excellence begins here.
                </h2>
<div class="flex items-center gap-4 text-white/80 font-body">
<span class="h-[1px] w-12 bg-white/40"></span>
<span class="uppercase tracking-[0.2em] text-xs font-bold">EST. MMXXIV</span>
</div>
</div>
<!-- Floating Badge for Premium Feel -->
<div class="absolute top-12 right-12 flex items-center gap-3 px-6 py-3 bg-white/10 backdrop-blur-xl rounded-full border border-white/20">
<span class="material-symbols-outlined text-white text-[20px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-white text-sm font-medium tracking-wide">Accredited Institution</span>
</div>
</section>
</main>
<!-- Mobile Navigation Suppressed as per Task Logic for Transactional Page -->
</body></html>
